name: Goach CI with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'corretto'
          cache: gradle

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        with:
          args: --baseline,qodana-baseline.json
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1618691014 }}

  build:
    runs-on: ubuntu-latest
    needs: qodana

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        env:
          SA_PASSWORD: "Pokemon.2012"
          ACCEPT_EULA: "Y"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'corretto'
          cache: gradle

      - name: Wait for SQL Server
        run: |
          echo "Waiting for SQL Server..."
          for i in {1..20}; do
            nc -z localhost 1433 && echo "SQL Server is up!" && break
            echo "Still waiting..."
            sleep 5
          done

      - name: Create Database
        run: |
          docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "Pokemon.2012" \
            -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'goach') CREATE DATABASE goach"

      - name: Run Tests
        run: |
          chmod +x gradlew
          ./gradlew clean test
        env:
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1433;databaseName=goach;encrypt=false;trustServerCertificate=true
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: "Pokemon.2012"
          SPRING_JPA_HIBERNATE_DDL_AUTO: create
          SPRING_SQL_INIT_MODE: never
          SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
