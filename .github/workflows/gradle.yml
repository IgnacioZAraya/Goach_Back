name: Goach CI with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        with:
          args: --baseline,qodana-baseline.json
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1618691014 }}

  build:
    runs-on: ubuntu-latest
    needs: qodana

    services:
      database:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pokemon.2012' -Q 'SELECT 1' -No"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
        env:
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          ACCEPT_EULA: "Y"

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: localhost
      DB_PORT: 1433

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Wait for SQL Server
        run: |
          for i in {1..15}; do
            docker exec $(docker ps -qf "ancestor=mcr.microsoft.com/mssql/server:2022-latest") \
              /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pokemon.2012' -Q "SELECT 1" -No \
              && echo "SQL Server ready" && exit 0
            echo "Waiting for SQL Server... attempt $i"
            sleep 5
          done
          exit 1

      - name: Run Tests
        run: ./gradlew clean test
