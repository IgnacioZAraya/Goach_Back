name: Goach CI with Gradle

on:
  push:
    branches: [ "develop" ]

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'corretto'
          cache: gradle

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        with:
          args: --baseline,qodana-baseline.json
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1618691014 }}

  build:
    runs-on: ubuntu-latest
    needs: qodana

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pokemon.2012' -Q 'SELECT 1' -No"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
        env:
          SA_PASSWORD: "Pokemon.2012"
          ACCEPT_EULA: "Y"

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: localhost
      DB_PORT: 1433

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'corretto'
          cache: gradle

      - name: Create Database
        run: |
          docker exec $(docker ps -qf "ancestor=mcr.microsoft.com/mssql/server:2022-latest") \
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${{ secrets.SA_PASSWORD }}" \
            -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'goach') CREATE DATABASE goach" -No

      - name: Seed Test Data
        run: |
          docker exec $(docker ps -qf "ancestor=mcr.microsoft.com/mssql/server:2022-latest") \
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${{ secrets.SA_PASSWORD }}" \
          -d goach -Q "
            INSERT INTO Users (id, email, password, role) VALUES 
            ('70125a08-9693-4873-89ec-1ecd7b0f595e', 'izeladaa@ucenfotec.ac.cr', '<password_hash>', 'ADMIN');
            INSERT INTO Gym (id, name, owner_id) VALUES
            ('368ca9f8-13f1-4b6e-9c48-4252c00a22b0', 'TestGym', '70125a08-9693-4873-89ec-1ecd7b0f595e');
          " -No

      - name: Build and Test
        run: |
          chmod +x gradlew
          ./gradlew clean test
        env:
          SPRING_DATASOURCE_URL: jdbc:sqlserver://localhost:1433;databaseName=goach;encrypt=false;trustServerCertificate=true
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: "Pokemon.2012"
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
